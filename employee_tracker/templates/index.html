<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hệ thống giám sát nhân viên</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }
    img {
      border: 2px solid #444;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    h1, h2, h3 {
      color: #2c3e50;
    }
    ul {
      list-style: none;
      padding: 0;
      max-width: 800px;
      margin: 0 auto;
      text-align: left;
    }
    li {
      margin-bottom: 6px;
      padding: 6px 12px;
      border-bottom: 1px solid #ddd;
    }
    .download-link {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 16px;
      background-color: #3498db;
      color: white;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
    }
    .download-link:hover {
      background-color: #2980b9;
    }
  </style>
</head>
<body>

  <h1>🎥 Hệ thống giám sát hành động nhân viên</h1>

  <!-- Upload video -->
  <form method="POST" action="/upload" enctype="multipart/form-data">
    <h3>📤 Tải lên video để xử lý:</h3>
    <input type="file" name="video" accept="video/*" required>
    <br><br>
    <button type="submit">Tải lên và xử lý</button>
  </form>

  <!-- Tải video đã xử lý -->
  {% if video_ready %}
    <br>
    <a href="/download_output" download class="download-link">📥 Tải video đã xử lý</a>
  {% endif %}

  <!-- Video livestream -->
  <h2>📡 Video livestream (realtime):</h2>
  <img src="{{ url_for('video_feed') }}" width="800" height="450">

  <!-- Lịch sử hành vi -->
  <h2>📖 Lịch sử hành động gần nhất</h2>
  <ul id="action-list">
  {% for row in actions %}
    <li>{{ row[1] }} - {{ row[2] }} - {{ row[3] }}</li>
  {% endfor %}
  </ul>


</body>
</html>
